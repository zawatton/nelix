name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-eval:
    name: Render + 'nix flake check --no-build' (Emacs ${{ matrix.emacs }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        emacs: ['30.1']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-experimental-features = nix-command flakes

      - name: Magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Show versions
        run: |
          emacs --version | head -1
          nix --version

      - name: Check repository flake
        run: make nix-check

      - name: Render examples + flake check
        run: make smoke-eval
