name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ert:
    name: ERT + byte-compile (Emacs ${{ matrix.emacs }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        emacs: ['30.1']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs }}

      - name: Show Emacs version
        run: emacs --version | head -1

      - name: Byte-compile (warnings-as-errors)
        run: make compile

      - name: Run ERT suite
        run: make test
